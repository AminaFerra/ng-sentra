# NG-SENTRA Nginx Configuration — AWS EC2 Distributed Architecture
# HTTPS/SSL Reverse Proxy with Security Headers for SOC Dashboard

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── Upstream Backends (AWS VPC Private IPs) ──────────────────────────────────
upstream ng_sentra {
    server 127.0.0.1:3000;
}

upstream n8n_backend {
    server 172.31.30.123:5678;
}

upstream wazuh_dashboard {
    server 172.31.41.10:443;
}

upstream tpot_dashboard {
    server 172.31.13.157:64297;
}

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name ngsentra.com *.ngsentra.com;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS Server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ngsentra.com *.ngsentra.com;

    # SSL Certificate Configuration
    # Use Let's Encrypt:  sudo certbot --nginx -d ngsentra.com
    # Or Cloudflare Origin Certificate:
    ssl_certificate     /etc/nginx/ssl/ng-sentra.crt;
    ssl_certificate_key /etc/nginx/ssl/ng-sentra.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-src 'self' http://localhost:* https://localhost:* https://172.31.41.10:* http://172.31.30.123:* https://172.31.13.157:*; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Increase server-level buffers to handle large OAuth/Session cookies
    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;

    # ─── NG-SENTRA App (localhost on this EC2) ────────────────────────────────
    location / {
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # ─── WebSocket Support for SOC Copilot and Terminal ───────────────────────
    location /api/copilot {
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/terminal {
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── API rate limiting ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket support ────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ─── n8n SOAR Dashboard (EC2: 172.31.30.123) ─────────────────────────────
    location /n8n/ {
        proxy_pass http://n8n_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Wazuh Dashboard (EC2: 172.31.41.10) ─────────────────────────────────
    location /wazuh/ {
        proxy_pass https://wazuh_dashboard/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── T-Pot Dashboard (EC2: 172.31.13.157) ────────────────────────────────
    location /tpot/ {
        proxy_pass https://tpot_dashboard/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Dynamic Component Reverse Proxy ──────────────────────────────────────
    # The Node.js app handles /proxy/:slug internally for iframe embedding
    location /proxy/ {
        proxy_pass http://ng_sentra;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # Increase buffer sizes to handle large headers/cookies (e.g., T-Pot)
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        large_client_header_buffers 4 32k;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}

# ─── SSL Certificate Instructions ─────────────────────────────────────────────
# Option 1: Let's Encrypt (recommended for public domain)
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d ngsentra.com
#
# Option 2: Cloudflare Origin Certificate (if using Cloudflare proxy)
#   1. Go to Cloudflare Dashboard → SSL/TLS → Origin Server
#   2. Create Certificate → download .pem and .key
#   3. Place at /etc/nginx/ssl/ng-sentra.crt and /etc/nginx/ssl/ng-sentra.key
#
# Option 3: Self-signed (for testing only)
#   mkdir -p /etc/nginx/ssl
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/ng-sentra.key \
#     -out /etc/nginx/ssl/ng-sentra.crt \
#     -subj "/C=EG/ST=Cairo/L=Cairo/O=NG-SENTRA SOC/CN=ngsentra.com"
